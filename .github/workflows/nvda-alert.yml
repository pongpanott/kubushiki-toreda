name: NVDA Price Alert (24/7 Mon–Fri)

# Public repo = unlimited Actions minutes → run every 60s, 24h Mon–Fri
# GitHub Actions max job runtime = 6h → 4 overlapping slots cover 24h:
#   slot-1 : 00:00 UTC → 361 min → ends 06:01 UTC  (UTC+7 = 07:00 start)
#   slot-2 : 05:55 UTC → 361 min → ends 11:56 UTC  (UTC+7 = 12:55 start)
#   slot-3 : 11:55 UTC → 361 min → ends 17:56 UTC  (UTC+7 = 18:55 start)
#   slot-4 : 17:55 UTC → 361 min → ends 23:56 UTC  (UTC+7 = 00:55 next day start)
# 5-min overlaps prevent gaps between slots.

on:
  schedule:
    - cron: '0 0  * * 1-5'   # slot-1 — 00:00 UTC (07:00 UTC+7)
    - cron: '55 5  * * 1-5'  # slot-2 — 05:55 UTC (12:55 UTC+7)
    - cron: '55 11 * * 1-5'  # slot-3 — 11:55 UTC (18:55 UTC+7)
    - cron: '55 17 * * 1-5'  # slot-4 — 17:55 UTC (00:55 UTC+7 next day)
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: 'Run duration in minutes'
        required: false
        default: '60'

jobs:
  monitor:
    name: Monitor NVDA (60s interval)
    runs-on: ubuntu-latest
    timeout-minutes: 375 # hard cap slightly above 361

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install yfinance requests
      - name: Run alert loop
        env:
          DISCORD_NVDA_ALERT_WEBHOOK: ${{ secrets.DISCORD_NVDA_ALERT_WEBHOOK }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          TIMEOUT=${{ github.event.inputs.timeout_minutes || '361' }}
          python3 scripts/nvda_discord_alert.py --interval 60 --timeout-minutes "${TIMEOUT}"
