name: NVDA Alert Levels — Notify & Manual Dispatch

# AI analysis pipeline is PAUSED — analysis is now done manually on local.
#
# Triggers:
#   - push to config/nvda_alert_levels.json on main → publish updated levels to Discord
#   - workflow_dispatch → re-run AI analysis manually (dry-run supported)
#
# Local analysis command:
#   python3 scripts/auto_analyze_and_update.py \
#     --finnhub-key $FINNHUB_API_KEY \
#     --analysis-webhook $DISCORD_ANALYSIS_WEBHOOK_URL
#   Then: git add config/nvda_alert_levels.json && git commit -m "manual: update NVDA levels" && git push

on:
  push:
    branches: [main]
    paths:
      - 'config/nvda_alert_levels.json'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print only, no commit)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Schedules are paused — uncomment to re-enable automated AI analysis:
# on:
#   schedule:
#     - cron: '0 12 * * 0'   # weekly Sunday 12:00 UTC = 19:00 TH
#     - cron: '0 21 * * 1-5' # weekday post-market (gated ≥4% move)
#     - cron: '0 12 1 6 *'   # pre-Computex June 1
#     - cron: '0 12 25 8 *'  # pre-Earnings August 25

permissions:
  contents: write # allow git push back to repo
  models: read # allow GitHub Models API access via GITHUB_TOKEN

jobs:
  # ── Job 1: publish Discord when config is pushed manually ──────────────────
  notify-on-push:
    name: Publish updated levels to Discord
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install dependencies
        run: pip install "openai>=1.0,<2" requests

      - name: Send updated levels to Discord
        env:
          DISCORD_ANALYSIS_WEBHOOK_URL: ${{ secrets.DISCORD_ANALYSIS_WEBHOOK_URL }}
        run: python3 scripts/auto_analyze_and_update.py --notify-only

  # ── Job 2: manual AI analysis via workflow_dispatch ────────────────────────
  analyze-and-update:
    name: AI analysis → update config → commit  (manual dispatch only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install dependencies
        run: pip install "openai>=1.0,<2" requests

      - name: Run AI analysis
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_ANALYSIS_WEBHOOK_URL: ${{ secrets.DISCORD_ANALYSIS_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python3 scripts/auto_analyze_and_update.py $ARGS

      - name: Commit updated config
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "nvda-alert-bot[bot]"
          git config user.email "nvda-alert-bot@users.noreply.github.com"
          git diff --quiet config/nvda_alert_levels.json || (
            git add config/nvda_alert_levels.json &&
            git commit -m "auto: update NVDA alert levels $(date -u +%Y-%m-%d)" &&
            git push
          )
          echo "Config commit step complete (no diff = already up to date)"
