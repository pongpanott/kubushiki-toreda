name: Auto-Update NVDA Alert Levels (AI Analysis)

# Fetches NVDA news from Finnhub, analyzes with Claude AI,
# updates config/nvda_alert_levels.json, and commits back to repo.
# Runs 1h BEFORE the reminder workflow so Discord receives fresh levels.
#
# Triggers:
#   - Weekly: Sunday 12:00 UTC = 19:00 TH  (full reset)
#   - Pre-Computex: June 1 / Pre-Earnings: August 25
#   - Manual dispatch (with optional dry-run)
#
# NOTE: Daily updates are intentionally omitted. Alert levels are weekly S/R
# structures that don't change meaningfully each day. Use manual dispatch or
# add a trigger when NVDA makes a genuinely large move (>4-5%).

on:
  schedule:
    - cron: '0 12 * * 0' # weekly Sunday 12:00 UTC = 19:00 TH (full reset, no gate)
    - cron: '0 21 * * 1-5' # weekday post-market 21:00 UTC = 4 PM ET (gated ≥4% move)
    - cron: '0 12 1 6 *' # pre-Computex June 1
    - cron: '0 12 25 8 *' # pre-Earnings August 25
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print only, no commit)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write # allow git push back to repo
  models: read # allow GitHub Models API (Claude Sonnet) access via GITHUB_TOKEN

jobs:
  analyze-and-update:
    name: AI analysis → update config → commit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install dependencies
        run: pip install "openai>=1.0,<2" requests

      - name: Notify Discord — pipeline starting
        env:
          DISCORD_ANALYSIS_WEBHOOK_URL: ${{ secrets.DISCORD_ANALYSIS_WEBHOOK_URL }}
        run: |
          python3 - <<'EOF'
          import os, requests, datetime
          url = os.getenv("DISCORD_ANALYSIS_WEBHOOK_URL")
          if not url:
              print("DISCORD_ANALYSIS_WEBHOOK_URL not set — skipping start notification")
              exit(0)
          embed = {
              "title": "\u2699\ufe0f NVDA Alert Update \u2014 Pipeline Starting",
              "description": "Auto-analyze & update NVDA alert levels has started.",
              "color": 0x3498DB,
              "fields": [
                  {"name": "Time (UTC)", "value": datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S"), "inline": True},
                  {"name": "Trigger", "value": os.getenv("GITHUB_EVENT_NAME", "unknown"), "inline": True},
              ],
              "footer": {"text": "claude-trading-skills / auto-update-alerts"},
          }
          resp = requests.post(url, json={"embeds": [embed]}, timeout=10)
          resp.raise_for_status()
          print("Start notification sent to Discord")
          EOF

      - name: Run AI analysis
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_ANALYSIS_WEBHOOK_URL: ${{ secrets.DISCORD_ANALYSIS_WEBHOOK_URL }}
        run: |
          ARGS=""
          # Dry-run flag from manual dispatch
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          # Weekday post-market runs (21:00 UTC = 4 PM ET) are gated:
          # skip Claude call if NVDA moved <4% from last saved price → saves premium tokens
          HOUR=$(date -u +%H)
          DAY=$(date -u +%u)   # 1=Mon … 7=Sun
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$DAY" != "7" ] && [ "$HOUR" = "21" ]; then
            ARGS="$ARGS --min-move-pct 4"
            echo "📊 Post-market weekday run — gated at ≥4% move"
          fi
          python3 scripts/auto_analyze_and_update.py $ARGS

      - name: Commit updated config
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "nvda-alert-bot[bot]"
          git config user.email "nvda-alert-bot@users.noreply.github.com"
          git diff --quiet config/nvda_alert_levels.json || (
            git add config/nvda_alert_levels.json &&
            git commit -m "auto: update NVDA alert levels $(date -u +%Y-%m-%d)" &&
            git push
          )
          echo "Config commit step complete (no diff = already up to date)"
