name: Stock Alert Levels — Notify & Manual Dispatch

# AI analysis pipeline is PAUSED — analysis is now done manually on local.
#
# Supported tickers: NVDA, SMCI
#
# Triggers:
#   - push to config/nvda_alert_levels.json → publish NVDA levels to Discord
#   - push to config/smci_alert_levels.json → publish SMCI levels to Discord
#   - workflow_dispatch → re-run AI analysis manually (dry-run supported)
#
# Local analysis command:
#   # NVDA
#   python3 scripts/auto_analyze_and_update.py --ticker NVDA \
#     --finnhub-key $FINNHUB_NVDA_API_KEY \
#     --analysis-webhook $DISCORD_NVDA_ALERT_WEBHOOK
#   # SMCI
#   python3 scripts/auto_analyze_and_update.py --ticker SMCI \
#     --finnhub-key $FINNHUB_SMCI_API_KEY \
#     --analysis-webhook $DISCORD_SMCI_ALERT_WEBHOOK
#   Then: git add config/<ticker>_alert_levels.json && git commit -m "manual: update levels" && git push

on:
  push:
    branches: [main]
    paths:
      - 'config/nvda_alert_levels.json'
      - 'config/smci_alert_levels.json'
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Stock ticker to analyze'
        required: false
        default: 'NVDA'
        type: choice
        options: ['NVDA', 'SMCI']
      dry_run:
        description: 'Dry run (print only, no commit)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Schedules are paused — uncomment to re-enable automated AI analysis:
# on:
#   schedule:
#     - cron: '0 12 * * 0'   # weekly Sunday 12:00 UTC = 19:00 TH
#     - cron: '0 21 * * 1-5' # weekday post-market (gated ≥4% move)

permissions:
  contents: write # allow git push back to repo
  models: read # allow GitHub Models API access via GITHUB_TOKEN

jobs:
  # ── Job 1a: publish NVDA levels to Discord ────────────────────────────────────
  notify-nvda:
    name: Publish NVDA levels to Discord
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.ticker == 'NVDA') ||
      (github.event_name == 'push' && contains(toJSON(github.event.head_commit.modified), 'nvda_alert_levels.json'))
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install dependencies
        run: pip install "openai>=1.0,<2" requests
      - name: Send NVDA levels to Discord
        env:
          TICKER: NVDA
          FINNHUB_NVDA_API_KEY: ${{ secrets.FINNHUB_NVDA_API_KEY }}
          DISCORD_NVDA_ALERT_WEBHOOK: ${{ secrets.DISCORD_NVDA_ALERT_WEBHOOK }}
          DISCORD_ANALYSIS_WEBHOOK_URL: ${{ secrets.DISCORD_ANALYSIS_WEBHOOK_URL }}
        run: python3 scripts/auto_analyze_and_update.py --ticker NVDA --notify-only

  # ── Job 1b: publish SMCI levels to Discord ────────────────────────────────────
  notify-smci:
    name: Publish SMCI levels to Discord
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.ticker == 'SMCI') ||
      (github.event_name == 'push' && contains(toJSON(github.event.head_commit.modified), 'smci_alert_levels.json'))
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install dependencies
        run: pip install "openai>=1.0,<2" requests
      - name: Send SMCI levels to Discord
        env:
          TICKER: SMCI
          FINNHUB_SMCI_API_KEY: ${{ secrets.FINNHUB_SMCI_API_KEY }}
          DISCORD_SMCI_ALERT_WEBHOOK: ${{ secrets.DISCORD_SMCI_ALERT_WEBHOOK }}
          DISCORD_ANALYSIS_WEBHOOK_URL: ${{ secrets.DISCORD_ANALYSIS_WEBHOOK_URL }}
        run: python3 scripts/auto_analyze_and_update.py --ticker SMCI --notify-only

  # ── Job 2: manual AI analysis via workflow_dispatch ───────────────────────────
  analyze-and-update:
    name: AI analysis → update config → commit  (manual dispatch only)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install dependencies
        run: pip install "openai>=1.0,<2" requests

      - name: Run AI analysis
        env:
          FINNHUB_NVDA_API_KEY: ${{ secrets.FINNHUB_NVDA_API_KEY }}
          FINNHUB_SMCI_API_KEY: ${{ secrets.FINNHUB_SMCI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_NVDA_ALERT_WEBHOOK: ${{ secrets.DISCORD_NVDA_ALERT_WEBHOOK }}
          DISCORD_SMCI_ALERT_WEBHOOK: ${{ secrets.DISCORD_SMCI_ALERT_WEBHOOK }}
          DISCORD_ANALYSIS_WEBHOOK_URL: ${{ secrets.DISCORD_ANALYSIS_WEBHOOK_URL }}
        run: |
          TICKER="${{ github.event.inputs.ticker || 'NVDA' }}"
          python3 scripts/auto_analyze_and_update.py --ticker "$TICKER"

      - name: Commit updated config
        run: |
          TICKER="${{ github.event.inputs.ticker || 'NVDA' }}"
          CONFIG="config/${TICKER,,}_alert_levels.json"
          git config user.name "alert-bot[bot]"
          git config user.email "alert-bot@users.noreply.github.com"
          git diff --quiet "$CONFIG" || (
            git add "$CONFIG" &&
            git commit -m "auto: update ${TICKER} alert levels $(date -u +%Y-%m-%d)" &&
            git push
          )
          echo "Config commit step complete"
